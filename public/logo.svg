<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Frame with Scissors and Computer -->
  <rect x="200" y="150" width="400" height="300" rx="30" stroke="#1e3a5f" stroke-width="20" fill="white"/>
  
  <!-- Scissors -->
  <circle cx="300" cy="250" r="40" stroke="#1e3a5f" stroke-width="12" fill="white"/>
  <circle cx="300" cy="350" r="40" stroke="#1e3a5f" stroke-width="12" fill="white"/>
  <line x1="300" y1="290" x2="400" y2="300" stroke="#1e3a5f" stroke-width="12"/>
  <line x1="300" y1="310" x2="400" y2="300" stroke="#1e3a5f" stroke-width="12"/>
  <line x1="400" y1="300" x2="450" y2="300" stroke="#b8860b" stroke-width="10"/>
  
  <!-- Computer Monitor -->
  <rect x="450" y="250" width="100" height="80" rx="5" stroke="#1e3a5f" stroke-width="8" fill="white"/>
  <rect x="455" y="255" width="90" height="60" fill="#1e3a5f"/>
  <rect x="485" y="330" width="30" height="15" fill="#1e3a5f"/>
  <rect x="475" y="345" width="50" height="8" rx="4" fill="#1e3a5f"/>
  
  <!-- Text: kniploket -->
  <text x="50" y="550" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#1e3a5f">knip</text>
  <text x="330" y="550" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#b8860b">loket</text>
  
  <!-- Decorative lines -->
  <line x1="100" y1="630" x2="260" y2="630" stroke="#b8860b" stroke-width="4"/>
  <line x1="540" y1="630" x2="700" y2="630" stroke="#b8860b" stroke-width="4"/>
  
  <!-- Text: tiko -->
  <text x="270" y="710" font-family="Arial, sans-serif" font-size="100" font-weight="300" fill="#1e3a5f" letter-spacing="20">tiko</text>
</svg>
